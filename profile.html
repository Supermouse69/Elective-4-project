<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile • Team Spotlight</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    

    <script>
        const savedMode = localStorage.getItem('darkMode')
        if (savedMode === 'true' || (savedMode === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen">


<nav class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-sky-500 rounded-2xl flex items-center justify-center text-white text-2xl">👥</div>
            <h1 class="text-2xl font-semibold tracking-tight text-white">Grupong Irreg</h1>
        </div>
        <div class="flex items-center gap-8 text-sm text-white">   <!-- ← THIS LINE WAS THE FIX -->
            <a href="index.html" class="nav-link font-medium hover:text-sky-400 transition-colors">Home</a>
            <a href="projects.html" class="nav-link font-medium hover:text-sky-400 transition-colors">Projects</a>
            <a href="about.html" class="nav-link font-medium hover:text-sky-400 transition-colors">About Us</a>

            <a href="contact.html" class="nav-link font-medium hover:text-sky-400 transition-colors">Contact</a>
            
            <button onclick="toggleDarkMode()" 
                    class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-zinc-900 transition-colors">
                <i id="theme-icon" class="fa-solid fa-gear text-xl"></i>
            </button>
        </div>
    </div>
</nav>

    <div class="max-w-7xl mx-auto px-6 py-8">
        

        <button onclick="window.location.href='index.html'" 
                class="flex items-center gap-2 text-sky-400 hover:text-sky-300 mb-6 font-medium">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Irregs
        </button>


        <div class="rounded-3xl overflow-hidden relative h-80 mb-12">
            <img id="profile-hero-image" src="" alt="" class="w-full h-full object-cover">
            <div class="profile-hero absolute inset-0 flex items-end p-8">
                <div>
                    <h1 id="profile-name" class="text-5xl font-semibold text-white tracking-tighter"></h1>
                    <p id="profile-role" class="text-sky-200 text-2xl"></p>
                </div>
            </div>
        </div>


        <div class="max-w-3xl mx-auto">
            <h3 class="text-2xl font-semibold mb-4">About us</h3>
            <p id="profile-bio" class="text-lg leading-relaxed text-zinc-600 dark:text-zinc-400"></p>
        </div>


        <div class="max-w-5xl mx-auto mt-16">
            <h3 class="text-2xl font-semibold mb-8 text-center">My Favorites &amp; Fun Facts</h3>
            <div id="info-cards" class="grid grid-cols-2 md:grid-cols-3 gap-6">

            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
