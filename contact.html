<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact • Grupong Irreg</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    

    <script>
        const savedMode = localStorage.getItem('darkMode')
        if (savedMode === 'true' || (savedMode === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        }
    </script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen">

    <nav class="bg-zinc-950 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-sky-500 rounded-2xl flex items-center justify-center text-white text-2xl">👥</div>
                <h1 class="text-2xl font-semibold tracking-tight text-white">Grupong Irreg</h1>
            </div>
            <div class="flex items-center gap-8 text-sm text-white">
                <a href="index.html" class="nav-link font-medium hover:text-sky-400 transition-colors">Home</a>
                <a href="projects.html" class="nav-link font-medium hover:text-sky-400 transition-colors">Projects</a>
                <a href="about.html" class="nav-link font-medium hover:text-sky-400 transition-colors">About Us</a>
                <a href="contact.html" class="nav-link font-medium hover:text-sky-400 transition-colors active">Contact</a>
                
                <button onclick="toggleDarkMode()" 
                        class="w-10 h-10 flex items-center justify-center rounded-2xl hover:bg-zinc-900 transition-colors">
                    <i id="theme-icon" class="fa-solid fa-gear text-xl"></i>
                </button>
            </div>
        </div>
    </nav>


    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="max-w-2xl mx-auto">
            <h2 class="text-5xl font-semibold tracking-tighter text-center mb-4">Let's Connect</h2>
            <p class="text-center text-zinc-600 dark:text-zinc-400 mb-12">
                Got a project, a question, or just want to say hi? We’d love to hear from you.
            </p>

            


            <div class="mt-16 grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                <div>
                    <i class="fa-solid fa-envelope text-3xl text-sky-500 mb-4"></i>
                    <p class="font-medium">
                        <a href="https://www.facebook.com/nathian.gaiaros" class="hover:underline">
                            OUR BIG GREAT GUY
                        </a>
                    </p>
                </div>
                <div>
                    <i class="fa-solid fa-phone text-3xl text-sky-500 mb-4"></i>
                    <p class="font-medium">09696724210</p>
                </div>
                <div>
                    <i class="fa-solid fa-map-marker-alt text-3xl text-sky-500 mb-4"></i>
                    <p class="font-medium">House</p>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
