<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROJECT: ELECTIVE 4</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Pacifico&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="index.css" />

  <!-- Dark Mode Style -->
  <style>
    #themeToggle {
      margin-left: 20px;
      padding: 8px 14px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 16px;
      background: #ff4da6;
      color: white;
      transition: 0.3s;
    }

    #themeToggle:hover {
      background: #ff1a8c;
    }

    .dark-mode {
      background-color: #121212;
      color: white;
    }

    .dark-mode nav {
      background-color: #000;
    }

    .dark-mode .hero {
      background: #1a1a1a;
    }

    .dark-mode a {
      color: white;
    }
  </style>

</head>

<body>

  <div class="hearts"></div>

  <nav>
    <div class="logo">Group ni Ferrera</div>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="pogi.html">Pinaka Pogi</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

    <!-- Dark Mode Button -->
    <button id="themeToggle">🌙</button>
  </nav>

  <section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
      <h1>POOGING IAN</h1>
      <h2>PINAKA POGI SA <span>BUONG MUNDO</span></h2>

      <p class="tagline">
        NAPAKA POGI SHEEESH.
      </p>

      <div class="buttons">
        <a href="https://www.facebook.com/nathian.gaiaros" target="_blank" class="btn primary">Explore</a>
        <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank" class="btn secondary">
          Watch 💖
        </a>
      </div>
    </div>
  </section>

  <!-- Dark Mode Script -->
  <script>
    const toggle = document.getElementById("themeToggle");

    toggle.addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");

      if (document.body.classList.contains("dark-mode")) {
        toggle.textContent = "☀️";
      } else {
        toggle.textContent = "🌙";
      }
    });
  </script>

</body>

</html>
